name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add private NuGet source
        env:
          NUGET_USERNAME: ${{ secrets.GH_NUGET_USERNAME }}
          NUGET_TOKEN: ${{ secrets.GH_NUGET_TOKEN }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/TitouanML/index.json" \
            --name GitHub \
            --username "$NUGET_USERNAME" \
            --password "$NUGET_TOKEN" \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/api.Tests/api.Tests.csproj --no-build --configuration Release --verbosity normal
