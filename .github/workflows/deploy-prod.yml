name: Deploy - Production

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Add private NuGet source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/TitouanML/index.json" \
            --name GitHub \
            --username ${{ secrets.GH_NUGET_USERNAME }} \
            --password ${{ secrets.GH_NUGET_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.GH_SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"CESIZEN-tma_cesizen-api" \
            /o:"cesizen-tma" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.GH_SONAR_TOKEN }}" \
            /d:sonar.cs.cobertura.reportsPaths="coverage/**/coverage.cobertura.xml" \
            /d:sonar.exclusions="**/Migrations/**" \
            /d:sonar.coverage.exclusions="**/Migrations/**,tests/**"

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test tests/api.Tests/api.Tests.csproj --no-build --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./coverage --verbosity normal

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.GH_SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.GH_SONAR_TOKEN }}"

  build-and-push:
    name: Build & Push Docker image (prod)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/cesizen-api:prod
            ghcr.io/${{ env.REPO_OWNER_LC }}/cesizen-api:latest
          build-args: |
            GITHUB_USERNAME=${{ secrets.GH_NUGET_USERNAME }}
            GITHUB_TOKEN=${{ secrets.GH_NUGET_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_OWNER_LC }}/cesizen-api:prod
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
