name: Deploy - Preprod

on:
  push:
    branches:
      - develop

jobs:
  test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add private NuGet source
        env:
          NUGET_USERNAME: ${{ secrets.GH_NUGET_USERNAME }}
          NUGET_TOKEN: ${{ secrets.GH_NUGET_TOKEN }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/TitouanML/index.json" \
            --name GitHub \
            --username "$NUGET_USERNAME" \
            --password "$NUGET_TOKEN" \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/api.Tests/api.Tests.csproj --no-build --configuration Release --verbosity normal

  build-and-push:
    name: Build & Push Docker image (preprod)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LC }}/cesizen-api:preprod
          build-args: |
            GITHUB_USERNAME=${{ secrets.GH_NUGET_USERNAME }}
          secrets: |
            github_token=${{ secrets.GH_NUGET_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REPO_OWNER_LC }}/cesizen-api:preprod
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
